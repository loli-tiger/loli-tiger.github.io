<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卢骊动画效果</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .letter {
            position: absolute;
            color: #4CAF50;
            font-size: 5vw; /* 使用视口宽度的百分比来确保在不同设备上都能适应 */
            opacity: 0; /* 初始状态为不可见 */
        }
        /* 定义动画 */
        @keyframes cross {
            0%, 100% { opacity: 0; transform: translateX(-100%); }
            25% { opacity: 1; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(100%); }
            75% { opacity: 1; transform: translateX(0); }
        }
        /* 应用动画到卢 */
        .Lu {
            animation: cross 3s infinite;
            left: 0;
        }
        /* 应用动画到骊 */
        .Li {
            animation: cross 3s infinite;
            animation-delay: 0.75s; /* 延迟0.75秒开始 */
            left: 50%; /* 调整位置以错开动画 */
        }
        /* 应用动画到空白占位符，用于调整骊的位置 */
        .placeholder {
            width: 0;
            height: 0;
            position: absolute;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="letter Lu">卢</div>
    <div class="letter placeholder"></div>
    <div class="letter Li">骊</div>
</body>
</html>
