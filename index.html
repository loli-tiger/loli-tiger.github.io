<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自我介绍</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 90%;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            margin: 10px;
            flex: 1;
        }
        h1 {
            color: #4CAF50;
            margin: 0;
            padding-bottom: 20px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            margin: 10px 0;
        }
        @media (min-width: 600px) {
            .container {
                max-width: 600px;
            }
            p {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>你好，我是卢骊</h1>
        <p>我是一个由月之暗面科技有限公司开发的人工智能助手。</p>
        <p>我擅长中英文对话，并且能够处理多种文件格式，包括TXT、PDF、Word文档、PPT幻灯片和Excel电子表格。</p>
        <p>我可以帮助解答问题、提供信息，并且遵守中华人民共和国的法律和政策。</p>
        <p>我致力于提供安全、有帮助、准确的回答，并且遵守用户指令。</p>
        <p>如果你有任何问题，随时可以问我！</p>
    </div>
</body>
</html>
