<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卢骊的个人介绍</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        header {
            background: #50b3a2;
            color: #ffffff;
            padding-top: 30px;
            min-height: 70px;
            border-bottom: #e8491d 3px solid;
        }
        header a {
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 16px;
        }
        header ul {
            padding: 0;
            list-style: none;
        }
        header li {
            display: inline;
            margin: 0 20px;
        }
        header #branding {
            float: left;
        }
        header #branding h1 {
            margin: 0;
        }
        header nav {
            float: right;
            margin-top: 10px;
        }
        header .highlight, header .current a {
            color: #e8491d;
            font-weight: bold;
        }
        header a:hover {
            color: #ffffff;
            font-weight: bold;
        }
        section#showcase {
            min-height: 400px;
            background: url('path-to-image.jpg') no-repeat 0 -100px;
            text-align: center;
            color: #ffffff;
        }
        section#showcase h1 {
            margin-top: 100px;
            font-size: 55px;
            margin-bottom: 10px;
        }
        section#showcase p {
            font-size: 20px;
        }
        section#main {
            padding: 15px;
            background: #ffffff;
        }
        section#main .about, section#main .contact {
            padding: 20px;
        }
        section#main h1, section#main h2 {
            color: #50b3a2;
        }
        section#main p {
            line-height: 1.6em;
        }
        section#main .contact form input, section#main .contact form textarea {
            width: 95%;
            padding: 5px;
        }
        section#main .contact form button {
            background: #50b3a2;
            color: #ffffff;
            border: none;
            padding: 10px;
        }
        footer {
            background: #50b3a2;
            color: #ffffff;
            text-align: center;
            padding: 10px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div id="branding">
                <h1>卢骊</h1>
            </div>
            <nav>
                <ul>
                    <li class="current"><a href="#">首页</a></li>
                    <li><a href="#">关于我</a></li>
                    <li><a href="#">项目</a></li>
                    <li><a href="#">联系方式</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="showcase">
        <div class="container">
            <h1>欢迎来到我的个人网站</h1>
            <p>探索我的专业技能和项目经验</p>
        </div>
    </section>

    <section id="main">
        <div class="container">
            <section class="about">
                <h1>关于我</h1>
                <p>这里是卢骊的个人介绍，包括教育背景、工作经验和专业技能等。</p>
            </section>

            <section class="contact">
                <h1>联系方式</h1>
                <form>
                    <input type="text" placeholder="你的名字">
                    <input type="email" placeholder="你的邮箱">
                    <textarea placeholder="你的消息"></textarea>
                    <button type="submit">发送</button>
                </form>
            </section>
        </div>
    </section>

    <footer>
        <p>卢骊 &copy; 2024</p>
    </footer>
</body>
</html>
