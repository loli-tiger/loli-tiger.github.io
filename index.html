<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卢骊动画效果</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif; /* 使用无衬线字体以更好地显示汉字 */
        }
        .letter {
            position: absolute;
            color: #4CAF50;
            opacity: 0; /* 初始状态为不可见 */
        }
        /* 定义动画 */
        @keyframes cross {
            0%, 100% { opacity: 0; transform: translateX(-100%); }
            10% { opacity: 1; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(0); }
            90% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(100%); }
        }
        /* 应用动画到卢 */
        .Lu {
            animation: cross 4s infinite;
            font-size: 8vw; /* 增加字体大小以适应手机屏幕 */
            left: 0;
        }
        /* 应用动画到骊 */
        .Li {
            animation: cross 4s infinite;
            animation-delay: -2s; /* 延迟2秒开始，使两个动画重叠 */
            font-size: 8vw; /* 字体大小与卢相同 */
            left: 0;
        }
    </style>
</head>
<body>
    <div class="letter Lu">卢</div>
    <div class="letter Li">骊</div>
</body>
</html>
