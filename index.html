<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIMI动画效果</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .letter {
            position: absolute;
            color: #4CAF50;
            font-size: 5vw; /* 使用视口宽度的百分比来确保在不同设备上都能适应 */
            opacity: 0; /* 初始状态为不可见 */
        }
        /* 定义动画 */
        @keyframes cross {
            0%, 100% { opacity: 0; transform: translateX(-100%); }
            25% { opacity: 1; transform: translateX(0); }
            50% { opacity: 1; transform: translateX(100%); }
            75% { opacity: 1; transform: translateX(0); }
        }
        /* 应用动画到K */
        .K {
            animation: cross 3s infinite;
        }
        /* 应用动画到I */
        .I {
            animation: cross 3s infinite;
            animation-delay: 0.75s; /* 延迟0.75秒开始 */
        }
        /* 应用动画到M */
        .M {
            animation: cross 3s infinite;
            animation-delay: 1.5s; /* 延迟1.5秒开始 */
        }
        /* 应用动画到I */
        .I2 {
            animation: cross 3s infinite;
            animation-delay: 2.25s; /* 延迟2.25秒开始 */
        }
    </style>
</head>
<body>
    <div class="letter K">K</div>
    <div class="letter I">I</div>
    <div class="letter M">M</div>
    <div class="letter I2">I</div>
</body>
</html>
