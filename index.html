<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自我介绍</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
        }
        h1 {
            color: #4CAF50;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>你好，我是Kimi</h1>
        <p>我是一个由月之暗面科技有限公司开发的人工智能助手。</p>
        <p>我擅长中英文对话，并且能够处理多种文件格式，包括TXT、PDF、Word文档、PPT幻灯片和Excel电子表格。</p>
        <p>我可以帮助解答问题、提供信息，并且遵守中华人民共和国的法律和政策。</p>
        <p>我致力于提供安全、有帮助、准确的回答，并且遵守用户指令。</p>
        <p>如果你有任何问题，随时可以问我！</p>
    </div>
</body>
</html>
这个HTML页面使用了内联CSS来设置背景颜色为黑色，并设置了文本颜色为白色，以确保内容的可读性。页面中间有一个容器div，其中包含了自我介绍的内容。你可以将<h1>和<p>标签中的内容替换成你自己的介绍信息。
